<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#16140F" />
<title>Kameraad — Barbier</title>
<link rel="stylesheet" href="../colors_and_type.css?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Oswald:wght@300;400;500;600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--paper); color: var(--fg1); font-family: var(--font-body); -webkit-tap-highlight-color: transparent; }
  .serif { font-family: var(--font-serif); font-weight: 500; }
  .eyebrow { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--track-eyebrow); font-size: .72rem; color: var(--gold-deep); }
  .muted { color: var(--fg-muted); }
  [hidden] { display: none !important; }

  /* ---- buttons ---- */
  .btn { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .08em; font-size: .82rem; border: 1px solid var(--ink); background: var(--ink); color: var(--paper); padding: 13px 18px; border-radius: var(--r-md); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; transition: filter .2s, background .2s; }
  .btn:active { filter: brightness(.9); }
  .btn--gold { background: var(--gold); border-color: var(--gold); color: var(--ink); }
  .btn--ghost { background: transparent; color: var(--ink); border-color: var(--border); }
  .btn--danger { background: transparent; color: #9B2C2C; border-color: rgba(155,44,44,.4); }
  .btn--ok { background: #2E7D52; border-color: #2E7D52; color: #fff; }
  .btn--lg { padding: 17px 22px; font-size: .92rem; }
  .btn--block { width: 100%; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ---- login ---- */
  #login { min-height: 100dvh; display: grid; place-items: center; background: radial-gradient(120% 80% at 50% 0%, #221F18 0%, var(--ink) 70%); padding: 24px; }
  .login__card { width: 100%; max-width: 380px; background: var(--paper); border-radius: var(--r-lg); padding: 32px 26px; box-shadow: var(--shadow-3); }
  .login__brand { text-align: center; color: var(--gold-deep); margin-bottom: 20px; }
  .login__card h1 { font-family: var(--font-serif); font-weight: 500; font-size: 1.7rem; margin: 0 0 4px; }
  .field { margin: 14px 0; }
  .field label { display: block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .1em; font-size: .68rem; color: var(--fg-muted); margin-bottom: 6px; }
  .in { width: 100%; padding: 13px 14px; border: 1px solid var(--border); border-radius: var(--r-md); font-family: var(--font-body); font-size: 1rem; background: var(--white); color: var(--fg1); }
  .in:focus { outline: none; border-color: var(--gold); }
  .err { color: #9B2C2C; font-size: .85rem; margin-top: 8px; }

  /* ---- app shell ---- */
  #app { min-height: 100dvh; display: flex; flex-direction: column; }
  .topbar { background: var(--ink); color: var(--paper); padding: 14px 18px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 30; }
  .topbar .brand { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .26em; font-size: .82rem; color: var(--gold-pale); }
  .topbar .who { margin-left: auto; text-align: right; line-height: 1.1; }
  .topbar .who b { font-family: var(--font-serif); font-weight: 500; font-size: 1.05rem; }
  .topbar .who small { display: block; color: var(--stone); font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; }
  .topbar .av { width: 40px; height: 40px; border-radius: 50%; display: grid; place-content: center; background: var(--gold); color: var(--ink); font-family: var(--font-serif); font-size: 1.1rem; }
  .iconbtn { background: transparent; border: 1px solid var(--line-on-ink); color: var(--paper); width: 40px; height: 40px; border-radius: var(--r-md); cursor: pointer; font-size: 1.1rem; display: grid; place-content: center; }

  .datebar { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: var(--paper-2); border-bottom: 1px solid var(--border); position: sticky; top: 68px; z-index: 20; }
  .datebar .dlabel { font-family: var(--font-serif); font-weight: 500; font-size: 1.15rem; flex: 1; text-align: center; }
  .datebar .nav { background: var(--white); border: 1px solid var(--border); width: 42px; height: 42px; border-radius: var(--r-md); font-size: 1.2rem; cursor: pointer; }

  main { flex: 1; padding: 18px; max-width: 760px; margin: 0 auto; width: 100%; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat { flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 14px; }
  .stat .n { font-family: var(--font-serif); font-size: 1.6rem; line-height: 1; }
  .stat .l { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--fg-muted); margin-top: 4px; }

  /* ---- appointment cards ---- */
  .appt { background: var(--white); border: 1px solid var(--border); border-left: 4px solid var(--gold); border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow-1); }
  .appt.done { border-left-color: #2E7D52; opacity: .92; }
  .appt.cancelled { border-left-color: #9B2C2C; opacity: .7; }
  .appt__top { display: flex; align-items: baseline; gap: 12px; }
  .appt__time { font-family: var(--font-serif); font-size: 1.5rem; line-height: 1; min-width: 64px; }
  .appt__cust { font-weight: 600; font-size: 1.05rem; }
  .appt__svc { color: var(--fg2); font-size: .9rem; margin-top: 2px; }
  .appt__badges { margin-left: auto; text-align: right; }
  .bdg { display: inline-block; font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; padding: 4px 9px; border-radius: var(--r-pill); background: var(--paper-2); color: var(--fg2); }
  .bdg--ok { background: #E2F0E8; color: #2E7D52; }
  .bdg--no { background: #F6E2E2; color: #9B2C2C; }
  .bdg--pay { background: #FBEBD2; color: #9A7B33; }
  .nps { font-size: 1.1rem; }
  .appt__actions { display: flex; gap: 10px; margin-top: 14px; }
  .appt__actions .btn { flex: 1; }
  .appt__note { margin-top: 10px; padding: 10px 12px; background: var(--paper-2); border-radius: var(--r-md); font-size: .88rem; color: var(--fg2); }
  .linkish { color: var(--gold-deep); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--fg-muted); }
  .empty .serif { font-size: 1.4rem; color: var(--fg1); display: block; margin-bottom: 6px; }

  /* ---- modal / sheet ---- */
  .scrim { position: fixed; inset: 0; background: rgba(22,20,15,.55); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
  @media (min-width: 640px) { .scrim { align-items: center; padding: 24px; } }
  .sheet { background: var(--paper); width: 100%; max-width: 520px; border-radius: var(--r-lg) var(--r-lg) 0 0; padding: 22px; max-height: 92dvh; overflow: auto; box-shadow: var(--shadow-3); }
  @media (min-width: 640px) { .sheet { border-radius: var(--r-lg); } }
  .sheet h2 { font-family: var(--font-serif); font-weight: 500; font-size: 1.5rem; margin: 0 0 4px; }
  .sheet__foot { display: flex; gap: 10px; margin-top: 22px; }
  .sheet__foot .btn { flex: 1; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* NPS chooser */
  .nps-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 14px 0; }
  .nps-opt { border: 1.5px solid var(--border); background: var(--white); border-radius: var(--r-md); padding: 16px 8px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
  .nps-opt .e { font-size: 1.8rem; }
  .nps-opt .t { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .06em; font-size: .7rem; margin-top: 6px; color: var(--fg2); }
  .nps-opt.on { border-color: var(--gold); background: #FBF6EA; }
  .nps-opt.on.dislike { border-color: #9B2C2C; background: #F8ECEC; }

  /* fiche rows */
  .fiche__row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: .95rem; }
  .fiche__row .k { color: var(--fg-muted); }
  .hist { margin-top: 4px; }
  .hist__item { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 13px 20px; border-radius: var(--r-pill); font-size: .9rem; z-index: 80; box-shadow: var(--shadow-2); }
</style>
</head>
<body>
  <!-- LOGIN -->
  <section id="login">
    <form class="login__card" id="loginForm" autocomplete="on">
      <div class="login__brand eyebrow">Kameraad Haarsnijder</div>
      <h1 class="serif">Barbier-console</h1>
      <p class="muted" style="font-size:.9rem;margin:0 0 6px">Log in om je dag te beheren.</p>
      <div class="field"><label>E-mail</label><input class="in" type="email" id="liEmail" autocomplete="username" placeholder="jij@kameraadhaarsnijder.be" /></div>
      <div class="field"><label>Wachtwoord</label><input class="in" type="password" id="liPass" autocomplete="current-password" placeholder="••••••••" /></div>
      <button class="btn btn--gold btn--block btn--lg" type="submit" id="liBtn">Aanmelden</button>
      <div class="err" id="liErr" hidden></div>
    </form>
  </section>

  <!-- APP -->
  <div id="app" hidden>
    <div class="topbar">
      <span class="brand">Kameraad</span>
      <button class="iconbtn" id="logoutBtn" title="Afmelden" aria-label="Afmelden">⎋</button>
      <div class="who"><b id="meName">—</b><small id="meRole">Barbier</small></div>
      <div class="av" id="meAv">·</div>
    </div>
    <div class="datebar">
      <button class="nav" id="dPrev" aria-label="Vorige dag">‹</button>
      <div class="dlabel" id="dLabel">—</div>
      <button class="nav" id="dToday" aria-label="Vandaag" title="Vandaag">•</button>
      <button class="nav" id="dNext" aria-label="Volgende dag">›</button>
    </div>
    <main>
      <div class="stat-row" id="statRow"></div>
      <button class="btn btn--gold btn--block btn--lg" id="addBtn" style="margin-bottom:16px">+ Nieuwe afspraak</button>
      <div id="dayList"></div>
    </main>
  </div>

  <div id="modalMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="barber.js?v=1"></script>
</body>
</html>
