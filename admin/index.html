<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kameraad — Beheer</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body)}
  .label{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.16em;font-size:.66rem;color:var(--gold-deep)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.1em;font-size:.78rem;padding:10px 16px;background:var(--gold);color:var(--ink);transition:background .15s}
  .btn:hover{background:var(--gold-bright)} .btn:disabled{opacity:.55;cursor:default}
  .btn.sm{padding:6px 11px;font-size:.72rem}
  .btn.ghost{background:none;border:1px solid var(--line-on-paper);color:var(--ink)} .btn.ghost:hover{background:var(--paper-2)}

  /* login */
  .login{min-height:100vh;display:grid;place-items:center;background:var(--ink)}
  .login__card{width:min(380px,92vw);background:var(--paper);border-radius:10px;padding:34px 30px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
  .login__logo{display:block;height:30px;margin:0 auto 6px}
  .login h1{font-family:var(--font-serif);font-weight:500;font-size:1.5rem;text-align:center;margin:.2em 0 .1em}
  .login p{text-align:center;color:var(--smoke);font-size:.86rem;margin:0 0 22px}
  .fld{margin:0 0 14px} .fld label{display:block;font-size:.72rem;letter-spacing:.04em;color:var(--fg2);margin:0 0 5px;text-transform:uppercase;font-family:var(--font-display)}
  .fld input,.fld select{width:100%;padding:10px 11px;border:1px solid var(--line-on-paper);border-radius:6px;font-size:.95rem;background:var(--white)}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--gold)}
  .err{color:#b3261e;background:rgba(206,75,51,.08);border:1px solid rgba(206,75,51,.3);border-radius:6px;padding:9px 11px;font-size:.85rem;margin:0 0 14px;display:none}
  .login .btn{width:100%;padding:12px}

  /* shell */
  .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .side{background:var(--ink);color:var(--paper);padding:18px 0;display:flex;flex-direction:column}
  .side__brand{display:flex;align-items:center;gap:9px;padding:0 20px 16px}
  .side__brand img{height:22px}
  .side__brand b{font-family:var(--font-display);letter-spacing:.14em;font-size:.72rem;color:var(--gold-pale)}
  .nav{display:flex;flex-direction:column;gap:1px;padding:6px 10px}
  .nav a{color:#cfc8b8;text-decoration:none;font-size:.92rem;padding:9px 12px;border-radius:6px;cursor:pointer}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.on{background:var(--gold);color:var(--ink);font-weight:600}
  .nav .grp{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#8a8474;padding:14px 12px 5px}
  .side__foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--ink-3);font-size:.8rem;color:#bdb6a6;display:flex;align-items:center;gap:8px}
  main{padding:24px 30px 60px;overflow:auto}
  h1.title{font-family:var(--font-serif);font-weight:500;font-size:1.7rem;margin:0 0 2px}
  .muted{color:var(--smoke)} .sub{color:var(--smoke);font-size:.85rem;margin:0 0 16px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:14px 0 22px}
  .kpi{background:var(--white);border:1px solid var(--line-on-paper);border-radius:8px;padding:14px 16px}
  .kpi .n{font-family:var(--font-serif);font-size:1.8rem;line-height:1;margin:.15em 0 0}
  table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line-on-paper);border-radius:8px;overflow:hidden;margin:0 0 18px}
  th,td{text-align:left;padding:10px 13px;border-bottom:1px solid var(--line-on-paper);font-size:.88rem;vertical-align:middle}
  th{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.07em;font-size:.62rem;color:var(--smoke);background:var(--paper-2)}
  tr:last-child td{border-bottom:none}
  .cust{font-weight:600} .meta{color:var(--smoke);font-size:.78rem}
  .pill{display:inline-block;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-size:.58rem;padding:4px 8px;border-radius:999px}
  .pill.ok{background:rgba(63,147,80,.14);color:#2c6e3c} .pill.done{background:rgba(201,162,75,.18);color:var(--gold-deep)}
  .pill.cancel{background:rgba(206,75,51,.12);color:#b3261e} .pill.noshow{background:rgba(138,133,123,.18);color:#6c675e}
  .pill.off{background:rgba(138,133,123,.16);color:#6c675e}
  .act{display:inline-flex;gap:6px;flex-wrap:wrap}
  .act button{border:1px solid var(--line-on-paper);background:var(--white);border-radius:5px;padding:5px 9px;font-size:.72rem;cursor:pointer;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.04em}
  .act button.done{border-color:var(--gold);color:var(--gold-deep)} .act button.cancel{border-color:rgba(206,75,51,.4);color:#b3261e}
  .act button:hover{background:var(--paper-2)}
  .toolbar{display:flex;align-items:center;gap:10px;margin:0 0 16px;flex-wrap:wrap}
  input.cell,select.cell{padding:6px 8px;border:1px solid var(--line-on-paper);border-radius:5px;font-size:.85rem;background:var(--white);width:90px}
  .empty{padding:18px;color:var(--smoke);font-size:.9rem;text-align:center;background:var(--white);border:1px dashed var(--line-on-paper);border-radius:8px;margin:0 0 18px}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:8px;font-size:.88rem;box-shadow:0 12px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:50}
  .toast.show{opacity:1}
  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(16,14,11,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(440px,94vw);background:var(--paper);box-shadow:-20px 0 60px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .25s;z-index:41;overflow:auto;padding:24px}
  .drawer.show{transform:none}
  .drawer h3{font-family:var(--font-serif);font-weight:500;font-size:1.3rem;margin:0 0 2px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:820px){.shell{grid-template-columns:1fr}.side{flex-direction:row;flex-wrap:wrap;align-items:center}.nav{flex-direction:row;flex-wrap:wrap}.nav .grp{display:none}.side__foot{display:none}.kpis{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<section class="login" id="loginView">
  <form class="login__card" id="loginForm">
    <img class="login__logo" src="assets/logo-gold.png" alt="Kameraad" />
    <h1>Beheer</h1>
    <p>Log in om je zaak te beheren</p>
    <div class="err" id="loginErr"></div>
    <div class="fld"><label for="email">E-mail</label><input id="email" type="email" autocomplete="username" required /></div>
    <div class="fld"><label for="pwd">Wachtwoord</label><input id="pwd" type="password" autocomplete="current-password" required /></div>
    <button class="btn" id="loginBtn" type="submit">Aanmelden</button>
  </form>
</section>

<!-- APP -->
<div class="shell" id="appView" hidden>
  <aside class="side">
    <div class="side__brand"><img src="assets/logo-gold.png" alt="" /><b>Beheer</b></div>
    <nav class="nav" id="nav">
      <span class="grp">Beheer</span>
      <a data-s="vandaag" class="on">Vandaag</a>
      <a data-s="agenda">Agenda</a>
      <a data-s="klanten">Klanten</a>
      <a data-s="statistieken">Statistieken</a>
      <span class="grp">Configuratie</span>
      <a data-s="diensten">Diensten</a>
      <a data-s="barbiers">Barbiers</a>
      <a data-s="beschikbaarheid">Beschikbaarheid</a>
      <a data-s="instellingen">Instellingen</a>
      <a data-s="beheerders">Beheerders</a>
    </nav>
    <div class="side__foot"><span id="who"></span><a class="btn ghost sm" id="logoutBtn" style="margin-left:auto">Afmelden</a></div>
  </aside>
  <main id="main"></main>
</div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SUPABASE_URL = 'https://hzvhyslujvkwqpkevahj.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_s7EpcEpv2hdZiNgufSWLlQ_xsGOifv_';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var TZ = 'Europe/Brussels';
  var DOW = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
  var DOW_FULL = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

  // ---- helpers ----
  function $(id){return document.getElementById(id);}
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function euro(c){return '€'+(c%100===0?c/100:(c/100).toFixed(2));}
  function localTime(iso){return new Date(iso).toLocaleTimeString('nl-BE',{timeZone:TZ,hour:'2-digit',minute:'2-digit'});}
  function localDate(iso){return new Date(iso).toLocaleDateString('nl-BE',{timeZone:TZ,weekday:'short',day:'numeric',month:'short'});}
  function dayKey(iso){return new Date(iso).toLocaleDateString('en-CA',{timeZone:TZ});}
  function todayKey(){return new Date().toLocaleDateString('en-CA',{timeZone:TZ});}
  function fullName(c){return c?((c.first_name||'')+' '+(c.last_name||'')).trim()||c.email||'—':'—';}
  function showToast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
  var STATUS={confirmed:{label:'Bevestigd',cls:'ok'},completed:{label:'Voltooid',cls:'done'},cancelled:{label:'Geannuleerd',cls:'cancel'},no_show:{label:'No-show',cls:'noshow'},pending:{label:'In afwachting',cls:'ok'}};
  function pill(st){var s=STATUS[st]||{label:st,cls:'ok'};return '<span class="pill '+s.cls+'">'+s.label+'</span>';}

  // ---- state ----
  var DATA = { appts:[], customers:[], services:[], barbers:[] };
  var agendaDate = new Date();

  // ---- auth ----
  $('loginForm').addEventListener('submit', async function(e){
    e.preventDefault(); $('loginErr').style.display='none';
    var b=$('loginBtn'); b.disabled=true; var lbl=b.textContent; b.textContent='…';
    var r=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('pwd').value});
    b.disabled=false; b.textContent=lbl;
    if(r.error){$('loginErr').textContent='Aanmelden mislukt — controleer e-mail en wachtwoord.';$('loginErr').style.display='block';return;}
    enterApp(r.data.session);
  });
  $('logoutBtn').addEventListener('click', async function(){await sb.auth.signOut();location.reload();});

  async function enterApp(session){
    $('loginView').style.display='none'; $('appView').hidden=false;
    var meta=(session.user&&session.user.user_metadata)||{};
    $('who').textContent=(meta.name?meta.name:'')+' · eigenaar';
    await loadCore();
    route('vandaag');
  }

  // ---- core data (cached) ----
  async function loadCore(){
    var a=await sb.from('appointments').select('id,start_at,end_at,status,customer_notes,customer_id,service_id,barber_id,customers(first_name,last_name,email,phone),services(name_nl,price_cents,duration_min),barbers(name,slug)').order('start_at');
    DATA.appts=a.data||[];
    var c=await sb.from('customers').select('id,first_name,last_name,email,phone,notes,no_show_count,reminder_opt_in,rebooking_opt_in,marketing_opt_in,created_at').order('last_name');
    DATA.customers=c.data||[];
    var s=await sb.from('services').select('id,slug,name_nl,price_cents,duration_min,is_active,is_walk_in,sort_order').order('sort_order');
    DATA.services=s.data||[];
    var b=await sb.from('barbers').select('id,slug,name,is_active,sort_order').order('sort_order');
    DATA.barbers=b.data||[];
  }
  async function reloadAppts(){var a=await sb.from('appointments').select('id,start_at,end_at,status,customer_notes,customer_id,service_id,barber_id,customers(first_name,last_name,email,phone),services(name_nl,price_cents,duration_min),barbers(name,slug)').order('start_at');DATA.appts=a.data||[];}

  // ---- routing ----
  var routes={};
  function route(name){
    document.querySelectorAll('#nav a').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-s')===name);});
    (routes[name]||routes.vandaag)();
  }
  $('nav').addEventListener('click',function(e){var a=e.target.closest('a[data-s]');if(a)route(a.getAttribute('data-s'));});

  // ---- appointment actions ----
  async function setStatus(id,status){
    var patch=status==='completed'?{status:'completed'}:{status:'cancelled',cancelled_at:new Date().toISOString()};
    var r=await sb.from('appointments').update(patch).eq('id',id);
    if(r.error){showToast('Mislukt — probeer opnieuw');return;}
    showToast(status==='completed'?'Gemarkeerd als voltooid':'Afspraak geannuleerd');
    await reloadAppts(); route(currentRoute);
  }
  var currentRoute='vandaag';
  function apptRows(list,withDate){
    if(!list.length)return '<div class="empty">Geen afspraken.</div>';
    var head='<table><thead><tr><th>Tijd</th>'+(withDate?'<th>Datum</th>':'')+'<th>Klant</th><th>Dienst</th><th>Barbier</th><th>Status</th><th></th></tr></thead><tbody>';
    return head+list.map(function(a){
      var actions=a.status==='confirmed'?'<div class="act"><button class="done" data-done="'+a.id+'">Voltooid</button><button class="cancel" data-cancel="'+a.id+'">Annuleer</button></div>':'';
      return '<tr><td>'+localTime(a.start_at)+'</td>'+(withDate?'<td>'+localDate(a.start_at)+'</td>':'')+
        '<td><span class="cust">'+esc(fullName(a.customers))+'</span><div class="meta">'+esc((a.customers&&a.customers.phone)||'')+'</div></td>'+
        '<td>'+esc(a.services&&a.services.name_nl)+'<div class="meta">'+(a.services?euro(a.services.price_cents):'')+'</div></td>'+
        '<td>'+esc(a.barbers&&a.barbers.name)+'</td><td>'+pill(a.status)+'</td><td>'+actions+'</td></tr>';
    }).join('')+'</tbody></table>';
  }
  function wireApptActions(){
    document.querySelectorAll('[data-done]').forEach(function(b){b.onclick=function(){setStatus(b.getAttribute('data-done'),'completed');};});
    document.querySelectorAll('[data-cancel]').forEach(function(b){b.onclick=function(){if(confirm('Deze afspraak annuleren?'))setStatus(b.getAttribute('data-cancel'),'cancelled');};});
  }

  // ---- VANDAAG ----
  routes.vandaag=function(){currentRoute='vandaag';
    var tk=todayKey(), now=Date.now();
    var today=DATA.appts.filter(function(a){return dayKey(a.start_at)===tk;});
    var up=DATA.appts.filter(function(a){return dayKey(a.start_at)!==tk && new Date(a.start_at).getTime()>=now;});
    var revToday=today.filter(function(a){return a.status==='completed';}).reduce(function(s,a){return s+(a.services?a.services.price_cents:0);},0);
    $('main').innerHTML='<h1 class="title">Vandaag</h1><div class="sub">'+new Date().toLocaleDateString('nl-BE',{timeZone:TZ,weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>'+
      '<div class="kpis"><div class="kpi"><span class="label">Afspraken</span><div class="n">'+today.length+'</div></div>'+
      '<div class="kpi"><span class="label">Binnenkort</span><div class="n">'+up.length+'</div></div>'+
      '<div class="kpi"><span class="label">Omzet (voltooid)</span><div class="n">'+euro(revToday)+'</div></div>'+
      '<div class="kpi"><span class="label">Klanten</span><div class="n">'+DATA.customers.length+'</div></div></div>'+
      '<h1 class="title" style="font-size:1.2rem">Vandaag</h1>'+apptRows(today,false)+
      '<h1 class="title" style="font-size:1.2rem">Binnenkort</h1>'+apptRows(up,true);
    wireApptActions();
  };

  // ---- AGENDA ----
  routes.agenda=function(){currentRoute='agenda';
    var dk=agendaDate.toLocaleDateString('en-CA',{timeZone:TZ});
    var list=DATA.appts.filter(function(a){return dayKey(a.start_at)===dk;});
    $('main').innerHTML='<h1 class="title">Agenda</h1><div class="toolbar"><button class="btn ghost sm" id="agPrev">‹</button>'+
      '<b style="min-width:220px;text-align:center">'+agendaDate.toLocaleDateString('nl-BE',{timeZone:TZ,weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</b>'+
      '<button class="btn ghost sm" id="agNext">›</button><button class="btn ghost sm" id="agToday">Vandaag</button></div>'+apptRows(list,false);
    wireApptActions();
    $('agPrev').onclick=function(){agendaDate.setDate(agendaDate.getDate()-1);routes.agenda();};
    $('agNext').onclick=function(){agendaDate.setDate(agendaDate.getDate()+1);routes.agenda();};
    $('agToday').onclick=function(){agendaDate=new Date();routes.agenda();};
  };

  // ---- KLANTEN ----
  routes.klanten=function(){currentRoute='klanten';
    var visits={}; DATA.appts.forEach(function(a){if(a.customer_id)visits[a.customer_id]=(visits[a.customer_id]||0)+1;});
    var rows=DATA.customers.map(function(c){
      return '<tr data-cid="'+c.id+'" style="cursor:pointer"><td><span class="cust">'+esc(fullName(c))+'</span></td><td class="meta">'+esc(c.email)+'</td><td class="meta">'+esc(c.phone||'')+'</td><td>'+(visits[c.id]||0)+'</td><td class="meta">'+(c.notes?'📝':'')+'</td></tr>';
    }).join('');
    $('main').innerHTML='<h1 class="title">Klanten</h1><div class="sub">'+DATA.customers.length+' klanten · klik voor details</div>'+
      (DATA.customers.length?'<table><thead><tr><th>Naam</th><th>E-mail</th><th>Telefoon</th><th>Bezoeken</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>':'<div class="empty">Nog geen klanten — ze verschijnen zodra er geboekt wordt.</div>');
    document.querySelectorAll('[data-cid]').forEach(function(tr){tr.onclick=function(){openCustomer(tr.getAttribute('data-cid'));};});
  };
  function openCustomer(id){
    var c=DATA.customers.find(function(x){return x.id===id;}); if(!c)return;
    var hist=DATA.appts.filter(function(a){return a.customer_id===id;}).sort(function(a,b){return new Date(b.start_at)-new Date(a.start_at);});
    var histHtml=hist.length?hist.map(function(a){return '<tr><td>'+localDate(a.start_at)+' '+localTime(a.start_at)+'</td><td>'+esc(a.services&&a.services.name_nl)+'</td><td>'+esc(a.barbers&&a.barbers.name)+'</td><td>'+pill(a.status)+'</td></tr>';}).join(''):'<tr><td colspan="4" class="meta">Nog geen bezoeken.</td></tr>';
    $('drawer').innerHTML='<button class="btn ghost sm" id="dwClose" style="float:right">Sluiten</button>'+
      '<h3>'+esc(fullName(c))+'</h3><div class="meta" style="margin-bottom:16px">'+esc(c.email)+'</div>'+
      '<div class="fld"><label>Telefoon</label><input id="cPhone" value="'+esc(c.phone||'')+'"></div>'+
      '<div class="fld"><label>Notitie</label><input id="cNotes" value="'+esc(c.notes||'')+'"></div>'+
      '<button class="btn sm" id="cSave">Opslaan</button>'+
      '<h3 style="font-size:1.05rem;margin:22px 0 8px">Historie</h3><table><tbody>'+histHtml+'</tbody></table>';
    openDrawer();
    $('dwClose').onclick=closeDrawer;
    $('cSave').onclick=async function(){
      var r=await sb.from('customers').update({phone:$('cPhone').value.trim()||null,notes:$('cNotes').value.trim()||null}).eq('id',id);
      if(r.error){showToast('Opslaan mislukt');return;}
      c.phone=$('cPhone').value.trim(); c.notes=$('cNotes').value.trim();
      showToast('Klant opgeslagen'); closeDrawer(); routes.klanten();
    };
  }

  // ---- STATISTIEKEN ----
  var statRange='month';
  routes.statistieken=function(){currentRoute='statistieken';
    var now=new Date(), from;
    if(statRange==='week'){from=new Date(now);from.setDate(now.getDate()-7);}
    else if(statRange==='month'){from=new Date(now);from.setMonth(now.getMonth()-1);}
    else from=new Date(0);
    var inRange=DATA.appts.filter(function(a){return new Date(a.start_at)>=from;});
    var completed=inRange.filter(function(a){return a.status==='completed';});
    var revenue=completed.reduce(function(s,a){return s+(a.services?a.services.price_cents:0);},0);
    var byBarber={}, byService={};
    completed.forEach(function(a){
      var bn=a.barbers?a.barbers.name:'—'; byBarber[bn]=byBarber[bn]||{n:0,r:0}; byBarber[bn].n++; byBarber[bn].r+=a.services?a.services.price_cents:0;
      var sn=a.services?a.services.name_nl:'—'; byService[sn]=byService[sn]||{n:0,r:0}; byService[sn].n++; byService[sn].r+=a.services?a.services.price_cents:0;
    });
    function tbl(obj){var k=Object.keys(obj);if(!k.length)return '<div class="empty">Nog geen voltooide afspraken in deze periode.</div>';return '<table><thead><tr><th>Naam</th><th>Aantal</th><th>Omzet</th></tr></thead><tbody>'+k.map(function(n){return '<tr><td>'+esc(n)+'</td><td>'+obj[n].n+'</td><td>'+euro(obj[n].r)+'</td></tr>';}).join('')+'</tbody></table>';}
    $('main').innerHTML='<h1 class="title">Statistieken</h1>'+
      '<div class="toolbar"><button class="btn '+(statRange==='week'?'':'ghost')+' sm" data-r="week">Week</button><button class="btn '+(statRange==='month'?'':'ghost')+' sm" data-r="month">Maand</button><button class="btn '+(statRange==='all'?'':'ghost')+' sm" data-r="all">Alles</button></div>'+
      '<div class="kpis"><div class="kpi"><span class="label">Afspraken</span><div class="n">'+inRange.length+'</div></div>'+
      '<div class="kpi"><span class="label">Voltooid</span><div class="n">'+completed.length+'</div></div>'+
      '<div class="kpi"><span class="label">No-shows</span><div class="n">'+inRange.filter(function(a){return a.status==='no_show';}).length+'</div></div>'+
      '<div class="kpi"><span class="label">Omzet</span><div class="n">'+euro(revenue)+'</div></div></div>'+
      '<div class="grid2"><div><h1 class="title" style="font-size:1.1rem">Per barbier</h1>'+tbl(byBarber)+'</div><div><h1 class="title" style="font-size:1.1rem">Per dienst</h1>'+tbl(byService)+'</div></div>';
    document.querySelectorAll('[data-r]').forEach(function(b){b.onclick=function(){statRange=b.getAttribute('data-r');routes.statistieken();};});
  };

  // ---- DIENSTEN ----
  routes.diensten=function(){currentRoute='diensten';
    var rows=DATA.services.map(function(s){
      return '<tr><td><span class="cust">'+esc(s.name_nl)+'</span>'+(s.is_walk_in?' <span class="pill off">walk-in</span>':'')+'</td>'+
        '<td><input class="cell" id="p_'+s.id+'" value="'+(s.price_cents/100)+'"> €</td>'+
        '<td><input class="cell" id="d_'+s.id+'" value="'+s.duration_min+'"> min</td>'+
        '<td>'+(s.is_active?'<span class="pill ok">Actief</span>':'<span class="pill off">Uit</span>')+'</td>'+
        '<td><div class="act"><button class="done" data-svsave="'+s.id+'">Opslaan</button><button data-svtog="'+s.id+'">'+(s.is_active?'Zet uit':'Activeer')+'</button></div></td></tr>';
    }).join('');
    $('main').innerHTML='<h1 class="title">Diensten</h1><div class="sub">Prijs en duur passen meteen toe op nieuwe boekingen</div><table><thead><tr><th>Dienst</th><th>Prijs</th><th>Duur</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    document.querySelectorAll('[data-svsave]').forEach(function(b){b.onclick=async function(){
      var id=b.getAttribute('data-svsave'); var pc=Math.round(parseFloat($('p_'+id).value)*100); var dm=parseInt($('d_'+id).value,10);
      if(isNaN(pc)||isNaN(dm)){showToast('Ongeldige waarde');return;}
      var r=await sb.from('services').update({price_cents:pc,duration_min:dm}).eq('id',id);
      if(r.error){showToast('Opslaan mislukt');return;}
      var s=DATA.services.find(function(x){return x.id===id;}); s.price_cents=pc; s.duration_min=dm; showToast('Dienst opgeslagen');
    };});
    document.querySelectorAll('[data-svtog]').forEach(function(b){b.onclick=async function(){
      var id=b.getAttribute('data-svtog'); var s=DATA.services.find(function(x){return x.id===id;});
      var r=await sb.from('services').update({is_active:!s.is_active}).eq('id',id);
      if(r.error){showToast('Mislukt');return;} s.is_active=!s.is_active; routes.diensten();
    };});
  };

  // ---- BARBIERS ----
  routes.barbiers=function(){currentRoute='barbiers';
    var rows=DATA.barbers.map(function(b){
      return '<tr><td><span class="cust">'+esc(b.name)+'</span></td><td class="meta">'+esc(b.slug)+'</td>'+
        '<td>'+(b.is_active?'<span class="pill ok">Actief</span>':'<span class="pill off">Uit</span>')+'</td>'+
        '<td><button class="btn ghost sm" data-btog="'+b.id+'">'+(b.is_active?'Zet uit':'Activeer')+'</button></td></tr>';
    }).join('');
    $('main').innerHTML='<h1 class="title">Barbiers</h1><div class="sub">Inactieve barbiers verdwijnen van de site en uit nieuwe boekingen</div><table><thead><tr><th>Naam</th><th>Slug</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    document.querySelectorAll('[data-btog]').forEach(function(x){x.onclick=async function(){
      var id=x.getAttribute('data-btog'); var b=DATA.barbers.find(function(y){return y.id===id;});
      var r=await sb.from('barbers').update({is_active:!b.is_active}).eq('id',id);
      if(r.error){showToast('Mislukt');return;} b.is_active=!b.is_active; routes.barbiers();
    };});
  };

  // ---- BESCHIKBAARHEID ----
  routes.beschikbaarheid=async function(){currentRoute='beschikbaarheid';
    $('main').innerHTML='<h1 class="title">Beschikbaarheid</h1><div class="sub">Laden…</div>';
    var av=await sb.from('availability').select('barber_id,day_of_week,start_time,end_time,barbers(slug,name)').order('day_of_week');
    var bl=await sb.from('blocked_slots').select('id,barber_id,start_at,end_at,reason,barbers(slug,name)').order('start_at');
    var byBarber={};
    (av.data||[]).forEach(function(r){var n=r.barbers?r.barbers.name:r.barber_id;byBarber[n]=byBarber[n]||{};byBarber[n][r.day_of_week]=r.start_time.slice(0,5)+'–'+r.end_time.slice(0,5);});
    var hrsTbl='<table><thead><tr><th>Barbier</th>'+[1,2,3,4,5,6,0].map(function(d){return '<th>'+DOW[d]+'</th>';}).join('')+'</tr></thead><tbody>'+
      Object.keys(byBarber).map(function(n){return '<tr><td class="cust">'+esc(n)+'</td>'+[1,2,3,4,5,6,0].map(function(d){return '<td class="meta">'+(byBarber[n][d]||'—')+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
    var now=Date.now();
    var upBlocks=(bl.data||[]).filter(function(b){return new Date(b.end_at||b.start_at).getTime()>=now;});
    var blkTbl=upBlocks.length?'<table><thead><tr><th>Datum</th><th>Wie</th><th>Reden</th><th></th></tr></thead><tbody>'+
      upBlocks.map(function(b){return '<tr><td>'+localDate(b.start_at)+'</td><td>'+esc(b.barbers?b.barbers.name:'Iedereen')+'</td><td class="meta">'+esc(b.reason||'')+'</td><td><button class="btn ghost sm" data-delblk="'+b.id+'">Verwijder</button></td></tr>';}).join('')+'</tbody></table>':'<div class="empty">Geen komende blokkades.</div>';
    var barberOpts='<option value="">Iedereen</option>'+DATA.barbers.map(function(b){return '<option value="'+b.id+'">'+esc(b.name)+'</option>';}).join('');
    $('main').innerHTML='<h1 class="title">Beschikbaarheid</h1><div class="sub">Wekelijkse uren per barbier</div>'+hrsTbl+
      '<h1 class="title" style="font-size:1.15rem;margin-top:18px">Blokkades & verlof</h1>'+blkTbl+
      '<div class="toolbar" style="margin-top:14px"><input class="cell" type="date" id="blkDate" style="width:150px"><select class="cell" id="blkWho" style="width:140px">'+barberOpts+'</select><input class="cell" id="blkReason" placeholder="Reden" style="width:200px"><button class="btn sm" id="blkAdd">+ Blokkade (hele dag)</button></div>';
    document.querySelectorAll('[data-delblk]').forEach(function(x){x.onclick=async function(){if(!confirm('Blokkade verwijderen?'))return;var r=await sb.from('blocked_slots').delete().eq('id',x.getAttribute('data-delblk'));if(r.error){showToast('Mislukt');return;}showToast('Blokkade verwijderd');routes.beschikbaarheid();};});
    $('blkAdd').onclick=async function(){
      var d=$('blkDate').value; if(!d){showToast('Kies een datum');return;}
      var start=new Date(d+'T00:00:00+02:00').toISOString(); var end=new Date(d+'T23:59:00+02:00').toISOString();
      var who=$('blkWho').value||null;
      var r=await sb.from('blocked_slots').insert({barber_id:who,start_at:start,end_at:end,reason:$('blkReason').value.trim()||'Gesloten'});
      if(r.error){showToast('Mislukt: '+r.error.message);return;} showToast('Blokkade toegevoegd'); routes.beschikbaarheid();
    };
  };

  // ---- INSTELLINGEN ----
  var SETTING_LABELS={cancellation_window_hours:'Annuleringsvenster (uren)',buffer_min:'Buffer na afspraak (min)',min_lead_time_hours:'Minimale voorsprong (uren)',booking_horizon_days:'Boekingshorizon (dagen)',slot_increment_min:'Starttijd-interval (min)',rebooking_weeks:'Herboekings-nudge (weken)'};
  routes.instellingen=async function(){currentRoute='instellingen';
    $('main').innerHTML='<h1 class="title">Instellingen</h1><div class="sub">Laden…</div>';
    var s=await sb.from('settings').select('key,value').order('key');
    var rows=(s.data||[]).map(function(r){return '<tr><td>'+esc(SETTING_LABELS[r.key]||r.key)+'</td><td><input class="cell" id="set_'+r.key+'" value="'+esc(typeof r.value==='object'?JSON.stringify(r.value):r.value)+'"></td><td><button class="btn done sm" data-setsave="'+r.key+'">Opslaan</button></td></tr>';}).join('');
    $('main').innerHTML='<h1 class="title">Instellingen</h1><div class="sub">Gelden meteen voor nieuwe boekingen</div><table><thead><tr><th>Instelling</th><th>Waarde</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    document.querySelectorAll('[data-setsave]').forEach(function(b){b.onclick=async function(){
      var k=b.getAttribute('data-setsave'); var raw=$('set_'+k).value.trim(); var val=isNaN(Number(raw))?raw:Number(raw);
      var r=await sb.from('settings').update({value:val}).eq('key',k);
      if(r.error){showToast('Opslaan mislukt');return;} showToast('Instelling opgeslagen');
    };});
  };

  // ---- BEHEERDERS ----
  routes.beheerders=async function(){currentRoute='beheerders';
    $('main').innerHTML='<h1 class="title">Beheerders</h1><div class="sub">Laden…</div>';
    var r=await sb.from('admin_users').select('email,role').order('role');
    var rows=(r.data||[]).map(function(a){return '<tr><td>'+esc(a.email)+'</td><td>'+esc(a.role==='owner'?'Eigenaar':'Barbier')+'</td></tr>';}).join('');
    $('main').innerHTML='<h1 class="title">Beheerders</h1><div class="sub">Wie kan inloggen</div><table><thead><tr><th>E-mail</th><th>Rol</th></tr></thead><tbody>'+(rows||'<tr><td colspan=2 class="meta">Geen</td></tr>')+'</tbody></table>';
  };

  // ---- drawer ----
  function openDrawer(){$('drawer').classList.add('show');$('scrim').classList.add('show');}
  function closeDrawer(){$('drawer').classList.remove('show');$('scrim').classList.remove('show');}
  $('scrim').addEventListener('click',closeDrawer);

  // ---- boot ----
  (async function(){var r=await sb.auth.getSession();if(r.data&&r.data.session)enterApp(r.data.session);})();
})();
</script>
</body>
</html>
