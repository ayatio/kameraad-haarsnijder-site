<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex,nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kameraad — Beheer</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body)}
  .wrap{width:min(1100px,94vw);margin-inline:auto}
  .label{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.18em;font-size:.7rem;color:var(--gold-deep)}

  /* ---------- login ---------- */
  .login{min-height:100vh;display:grid;place-items:center;background:var(--ink)}
  .login__card{width:min(380px,92vw);background:var(--paper);border-radius:10px;padding:34px 30px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
  .login__logo{display:block;height:30px;margin:0 auto 6px}
  .login h1{font-family:var(--font-serif);font-weight:500;font-size:1.5rem;text-align:center;margin:.2em 0 .1em}
  .login p{text-align:center;color:var(--smoke);font-size:.86rem;margin:0 0 22px}
  .fld{margin:0 0 14px}
  .fld label{display:block;font-size:.74rem;letter-spacing:.04em;color:var(--fg2);margin:0 0 5px;text-transform:uppercase;font-family:var(--font-display)}
  .fld input{width:100%;padding:11px 12px;border:1px solid var(--line-on-paper);border-radius:6px;font-size:1rem;background:var(--white)}
  .fld input:focus{outline:none;border-color:var(--gold)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:6px;cursor:pointer;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.12em;font-size:.8rem;padding:12px 18px;background:var(--gold);color:var(--ink);width:100%;transition:background .15s}
  .btn:hover{background:var(--gold-bright)}
  .btn:disabled{opacity:.55;cursor:default}
  .err{color:#b3261e;background:rgba(206,75,51,.08);border:1px solid rgba(206,75,51,.3);border-radius:6px;padding:9px 11px;font-size:.85rem;margin:0 0 14px;display:none}

  /* ---------- app ---------- */
  .top{background:var(--ink);color:var(--paper);padding:14px 0}
  .top .wrap{display:flex;align-items:center;gap:14px}
  .top img{height:24px}
  .top .who{margin-left:auto;font-size:.85rem;color:var(--gold-pale)}
  .top .btn-ghost{background:none;border:1px solid var(--line-on-ink);color:var(--paper);width:auto;padding:8px 14px}
  .top .btn-ghost:hover{background:rgba(255,255,255,.08)}
  main{padding:26px 0 60px}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:0 0 26px}
  .kpi{background:var(--white);border:1px solid var(--line-on-paper);border-radius:8px;padding:16px 18px}
  .kpi .n{font-family:var(--font-serif);font-size:2rem;line-height:1;margin:.15em 0 0}
  .sec{margin:0 0 28px}
  .sec h2{font-family:var(--font-serif);font-weight:500;font-size:1.3rem;margin:0 0 4px}
  .sec .sub{color:var(--smoke);font-size:.84rem;margin:0 0 12px}
  table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line-on-paper);border-radius:8px;overflow:hidden}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line-on-paper);font-size:.9rem;vertical-align:middle}
  th{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.08em;font-size:.66rem;color:var(--smoke);background:var(--paper-2)}
  tr:last-child td{border-bottom:none}
  .cust{font-weight:600}
  .meta{color:var(--smoke);font-size:.8rem}
  .pill{display:inline-block;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.06em;font-size:.6rem;padding:4px 9px;border-radius:999px}
  .pill.ok{background:rgba(63,147,80,.14);color:#2c6e3c}
  .pill.done{background:rgba(201,162,75,.18);color:var(--gold-deep)}
  .pill.cancel{background:rgba(206,75,51,.12);color:#b3261e}
  .pill.noshow{background:rgba(138,133,123,.18);color:#6c675e}
  .act{display:inline-flex;gap:6px}
  .act button{border:1px solid var(--line-on-paper);background:var(--white);border-radius:5px;padding:5px 9px;font-size:.74rem;cursor:pointer;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em}
  .act button.done{border-color:var(--gold);color:var(--gold-deep)}
  .act button.cancel{border-color:rgba(206,75,51,.4);color:#b3261e}
  .act button:hover{background:var(--paper-2)}
  .empty{padding:18px;color:var(--smoke);font-size:.9rem;text-align:center;background:var(--white);border:1px dashed var(--line-on-paper);border-radius:8px}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:8px;font-size:.88rem;box-shadow:0 12px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s}
  .toast.show{opacity:1}
  @media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}.hide-sm{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<section class="login" id="loginView">
  <form class="login__card" id="loginForm">
    <img class="login__logo" src="assets/logo-gold.png" alt="Kameraad" />
    <h1>Beheer</h1>
    <p>Log in om je afspraken te beheren</p>
    <div class="err" id="loginErr"></div>
    <div class="fld"><label for="email">E-mail</label><input id="email" type="email" autocomplete="username" required /></div>
    <div class="fld"><label for="pwd">Wachtwoord</label><input id="pwd" type="password" autocomplete="current-password" required /></div>
    <button class="btn" id="loginBtn" type="submit">Aanmelden</button>
  </form>
</section>

<!-- APP -->
<div id="appView" hidden>
  <header class="top">
    <div class="wrap">
      <img src="assets/logo-gold.png" alt="Kameraad" />
      <span class="label" style="color:var(--gold-pale)">Beheer</span>
      <span class="who" id="who"></span>
      <button class="btn btn-ghost" id="logoutBtn" style="margin-left:14px">Afmelden</button>
    </div>
  </header>
  <main class="wrap">
    <div class="kpis">
      <div class="kpi"><span class="label">Vandaag</span><div class="n" id="kToday">–</div></div>
      <div class="kpi"><span class="label">Binnenkort</span><div class="n" id="kUpcoming">–</div></div>
      <div class="kpi"><span class="label">Klanten</span><div class="n" id="kCust">–</div></div>
    </div>

    <section class="sec">
      <h2>Vandaag</h2>
      <div class="sub" id="todayDate"></div>
      <div id="todayWrap"></div>
    </section>

    <section class="sec">
      <h2>Binnenkort</h2>
      <div class="sub">Aankomende bevestigde afspraken</div>
      <div id="upWrap"></div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SUPABASE_URL = 'https://hzvhyslujvkwqpkevahj.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_s7EpcEpv2hdZiNgufSWLlQ_xsGOifv_';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var TZ = 'Europe/Brussels';

  var loginView = document.getElementById('loginView');
  var appView = document.getElementById('appView');
  var loginForm = document.getElementById('loginForm');
  var loginErr = document.getElementById('loginErr');
  var loginBtn = document.getElementById('loginBtn');

  function showToast(msg) {
    var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 2600);
  }
  function localDate(iso) { return new Date(iso).toLocaleDateString('nl-BE', { timeZone: TZ, weekday: 'short', day: 'numeric', month: 'short' }); }
  function localTime(iso) { return new Date(iso).toLocaleTimeString('nl-BE', { timeZone: TZ, hour: '2-digit', minute: '2-digit' }); }
  function dayKey(iso) { return new Date(iso).toLocaleDateString('en-CA', { timeZone: TZ }); } // YYYY-MM-DD
  function euro(c) { return '€' + (c % 100 === 0 ? c / 100 : (c / 100).toFixed(2)); }
  function esc(s) { return (s || '').replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  var STATUS = {
    confirmed: { label: 'Bevestigd', cls: 'ok' },
    completed: { label: 'Voltooid', cls: 'done' },
    cancelled: { label: 'Geannuleerd', cls: 'cancel' },
    no_show:   { label: 'No-show', cls: 'noshow' },
    pending:   { label: 'In afwachting', cls: 'ok' }
  };

  // ---------- auth ----------
  loginForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    loginErr.style.display = 'none';
    loginBtn.disabled = true; var lbl = loginBtn.textContent; loginBtn.textContent = '…';
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('pwd').value;
    var r = await sb.auth.signInWithPassword({ email: email, password: password });
    loginBtn.disabled = false; loginBtn.textContent = lbl;
    if (r.error) { loginErr.textContent = 'Aanmelden mislukt — controleer e-mail en wachtwoord.'; loginErr.style.display = 'block'; return; }
    enterApp(r.data.session);
  });

  document.getElementById('logoutBtn').addEventListener('click', async function () {
    await sb.auth.signOut(); location.reload();
  });

  function enterApp(session) {
    loginView.style.display = 'none';
    appView.hidden = false;
    var meta = (session && session.user && session.user.user_metadata) || {};
    document.getElementById('who').textContent = (meta.name ? meta.name + ' · ' : '') + (session.user.email);
    loadData();
  }

  // ---------- data ----------
  async function loadData() {
    var r = await sb.from('appointments')
      .select('id,start_at,end_at,status,customer_notes,customers(first_name,last_name,email,phone),services(name_nl,price_cents),barbers(name)')
      .order('start_at');
    if (r.error) { showToast('Kon afspraken niet laden'); console.warn(r.error); return; }
    var rows = r.data || [];
    var todayKey = new Date().toLocaleDateString('en-CA', { timeZone: TZ });
    var nowMs = Date.now();
    var today = [], up = [];
    rows.forEach(function (a) {
      var k = dayKey(a.start_at);
      if (k === todayKey) today.push(a);
      else if (new Date(a.start_at).getTime() >= nowMs) up.push(a);
    });
    document.getElementById('todayDate').textContent =
      new Date().toLocaleDateString('nl-BE', { timeZone: TZ, weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('kToday').textContent = today.length;
    document.getElementById('kUpcoming').textContent = up.length;

    // distinct customers (across all loaded appts)
    var emails = {}; rows.forEach(function (a) { if (a.customers && a.customers.email) emails[a.customers.email] = 1; });
    document.getElementById('kCust').textContent = Object.keys(emails).length;

    document.getElementById('todayWrap').innerHTML = renderTable(today, true);
    document.getElementById('upWrap').innerHTML = renderTable(up, false);
    wireActions();
  }

  function renderTable(list, isToday) {
    if (!list.length) return '<div class="empty">' + (isToday ? 'Geen afspraken vandaag.' : 'Nog geen aankomende afspraken.') + '</div>';
    var head = '<table><thead><tr><th>Tijd</th>' + (isToday ? '' : '<th>Datum</th>') +
      '<th>Klant</th><th class="hide-sm">Telefoon</th><th>Dienst</th><th>Barbier</th><th>Status</th><th></th></tr></thead><tbody>';
    var body = list.map(function (a) {
      var c = a.customers || {}, s = a.services || {}, b = a.barbers || {};
      var st = STATUS[a.status] || { label: a.status, cls: 'ok' };
      var name = esc(((c.first_name || '') + ' ' + (c.last_name || '')).trim() || c.email || '—');
      var actions = a.status === 'confirmed'
        ? '<div class="act"><button class="done" data-act="complete" data-id="' + a.id + '">Voltooid</button>' +
          '<button class="cancel" data-act="cancel" data-id="' + a.id + '">Annuleer</button></div>'
        : '';
      return '<tr>' +
        '<td>' + localTime(a.start_at) + '</td>' +
        (isToday ? '' : '<td>' + localDate(a.start_at) + '</td>') +
        '<td><span class="cust">' + name + '</span>' + (a.customer_notes ? '<div class="meta">📝 ' + esc(a.customer_notes) + '</div>' : '') + '</td>' +
        '<td class="hide-sm meta">' + esc(c.phone || '') + '</td>' +
        '<td>' + esc(s.name_nl || '') + '<div class="meta">' + (s.price_cents != null ? euro(s.price_cents) : '') + '</div></td>' +
        '<td>' + esc(b.name || '') + '</td>' +
        '<td><span class="pill ' + st.cls + '">' + st.label + '</span></td>' +
        '<td>' + actions + '</td>' +
        '</tr>';
    }).join('');
    return head + body + '</tbody></table>';
  }

  function wireActions() {
    document.querySelectorAll('[data-act]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        var id = btn.getAttribute('data-id'), act = btn.getAttribute('data-act');
        if (act === 'cancel' && !confirm('Deze afspraak annuleren? De klant houdt het tijdslot vrij.')) return;
        btn.disabled = true;
        var patch = act === 'complete'
          ? { status: 'completed' }
          : { status: 'cancelled', cancelled_at: new Date().toISOString() };
        var r = await sb.from('appointments').update(patch).eq('id', id);
        if (r.error) { showToast('Mislukt — probeer opnieuw'); btn.disabled = false; console.warn(r.error); return; }
        showToast(act === 'complete' ? 'Gemarkeerd als voltooid' : 'Afspraak geannuleerd');
        loadData();
      });
    });
  }

  // ---------- boot ----------
  (async function () {
    var r = await sb.auth.getSession();
    if (r.data && r.data.session) enterApp(r.data.session);
  })();
})();
</script>
</body>
</html>
